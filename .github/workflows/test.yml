name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          environment-file: ""
          activate-environment: beer
          auto-activate-base: false

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'setup.cfg', 'setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install BEER (no ESM/torch)
        shell: bash -el {0}
        run: |
          conda run -n beer pip install .

      - name: Run pytest
        shell: bash -el {0}
        run: |
          conda run -n beer pytest beer/tests/ -v --tb=short

      - name: Smoke-test GUI import (display only)
        shell: bash -el {0}
        run: |
          if [ -n "$DISPLAY" ]; then
            conda run -n beer python -c "import beer; from beer.gui.main_window import ProteinAnalyzerGUI; print('import OK')"
          else
            echo "No DISPLAY available — skipping GUI import check."
          fi
