name: Build BEER Executables

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: beer-linux
            asset_name: beer-linux-x86_64
          - os: macos-13
            artifact_name: beer-macos
            asset_name: beer-macos-x86_64
          - os: windows-2022
            artifact_name: beer.exe
            asset_name: beer-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install biopython matplotlib PyQt5 mplcursors numpy pyinstaller

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 \
            libgl1-mesa-dev libglib2.0-0 libfontconfig1 libdbus-1-3 \
            xvfb libxcb1 libx11-6

      - name: Build with PyInstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name beer \
            --hidden-import Bio \
            --hidden-import Bio.PDB \
            --hidden-import Bio.SeqUtils \
            --hidden-import Bio.SeqUtils.ProtParam \
            --hidden-import Bio.Blast \
            --hidden-import Bio.Blast.NCBIWWW \
            --hidden-import Bio.Blast.NCBIXML \
            --collect-submodules Bio \
            --collect-submodules matplotlib \
            --collect-submodules mplcursors \
            beer.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name beer `
            --hidden-import Bio `
            --hidden-import Bio.PDB `
            --hidden-import Bio.SeqUtils `
            --hidden-import Bio.SeqUtils.ProtParam `
            --hidden-import Bio.Blast `
            --hidden-import Bio.Blast.NCBIWWW `
            --hidden-import Bio.Blast.NCBIXML `
            --collect-submodules Bio `
            --collect-submodules matplotlib `
            --collect-submodules mplcursors `
            beer.py

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/beer

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/beer.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
